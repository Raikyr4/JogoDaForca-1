server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Evita servir index.html antigo apos rebuild/deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Assets do Vite possuem hash no nome, podem ser cacheados com seguranca.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
