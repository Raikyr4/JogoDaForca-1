global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "game-servers"
    metrics_path: /metrics
    static_configs:
      - targets:
          - game-server-1:8000
          - game-server-2:8000

  - job_name: "game-health"
    metrics_path: /health
    static_configs:
      - targets:
          - game-server-1:8000
          - game-server-2:8000
