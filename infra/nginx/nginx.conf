worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    map $arg_server $forced_backend {
        default "";
        game-server-1 game-server-1:8000;
        game-server-2 game-server-2:8000;
    }

    upstream frontend_app {
        server frontend:80;
    }

    upstream game_servers {
        least_conn;
        server game-server-1:8000 max_fails=1 fail_timeout=2s;
        server game-server-2:8000 max_fails=1 fail_timeout=2s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            error_page 418 = @api_forced_backend;
            if ($forced_backend != "") {
                return 418;
            }
            proxy_pass http://game_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            error_page 419 = @ws_forced_backend;
            if ($forced_backend != "") {
                return 419;
            }
            proxy_pass http://game_servers/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
        }

        location @api_forced_backend {
            proxy_pass http://$forced_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location @ws_forced_backend {
            proxy_pass http://$forced_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
        }

        location /health/backend {
            proxy_pass http://game_servers/health;
            proxy_set_header Host $host;
        }
    }
}
