worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream frontend_app {
        server frontend:80;
    }

    upstream game_servers {
        least_conn;
        server game-server-1:8000 max_fails=1 fail_timeout=2s;
        server game-server-2:8000 max_fails=1 fail_timeout=2s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $api_upstream http://game_servers;
            if ($arg_server = "game-server-1") {
                set $api_upstream http://game-server-1:8000;
            }
            if ($arg_server = "game-server-2") {
                set $api_upstream http://game-server-2:8000;
            }
            proxy_pass $api_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            set $ws_upstream http://game_servers;
            if ($arg_server = "game-server-1") {
                set $ws_upstream http://game-server-1:8000;
            }
            if ($arg_server = "game-server-2") {
                set $ws_upstream http://game-server-2:8000;
            }
            proxy_pass $ws_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
        }

        location /health/backend {
            proxy_pass http://game_servers/health;
            proxy_set_header Host $host;
        }
    }
}
